<div class="mt-3 mb-6 text-2xl font-medium">Contacts</div>

<div class="flex gap-4">

  <!-- SOL tərəf -->
  <nz-card class="w-1/2" nzTitle="All users">
    <nz-table #basicTable [nzData]="users">
      <tbody>
      <tr *ngFor="let data of basicTable.data">
        <td class="flex items-center mt-2">
          <nz-badge [nzDot]="data.isActive" [nzStyle]="{ backgroundColor: '#52c41a' }">
            <nz-avatar
              [nzSrc]="userService.getImgFullPath(data.photo)"
              [nzSize]="24">
            </nz-avatar>
          </nz-badge>
          <div class="pt-px text-15"> {{data.name}}</div>
        </td>

        <td>
          <button nz-button nzType="default" nzShape="round"
                  (click)="sendOffer(data.appUserId.toString(),data.photo)">
            <nz-icon nzType="video-camera" nzTheme="twotone" nzTwotoneColor="#52c41a"/>
          </button>

          <button nz-button nzType="default" nzShape="round"
                  (click)="sendChatOffer(data.appUserId.toString(),data.photo)">
            <nz-icon nzType="wechat" nzTheme="outline"/>
          </button>
        </td>
      </tr>
      </tbody>
    </nz-table>
  </nz-card>

  <!-- SAĞ tərəf (yeni panel) -->
  <nz-card class="w-1/2" nzTitle="Admin">
    <nz-table #basicTableAdmin [nzData]="admins">
      <tbody>
      <tr *ngFor="let data of basicTableAdmin.data">
        <td class="flex items-center mt-2">
          <nz-badge [nzDot]="data.isActive" [nzStyle]="{ backgroundColor: '#52c41a' }">
            <nz-avatar
              [nzSrc]="userService.getImgFullPath(data.photo)"
              [nzSize]="24">
            </nz-avatar>
          </nz-badge>
          <div class="pt-px text-15"> {{data.name}}</div>
        </td>

        <td>
          <button nz-button nzType="default" nzShape="round"
                  (click)="sendOffer(data.appUserId.toString(),data.photo)">
            <nz-icon nzType="video-camera" nzTheme="twotone" nzTwotoneColor="#52c41a"/>
          </button>

          <button nz-button nzType="default" nzShape="round"
                  (click)="sendChatOffer(data.appUserId.toString(),data.photo)">
            <nz-icon nzType="wechat" nzTheme="outline"/>
          </button>
        </td>
      </tr>
      </tbody>
    </nz-table>
  </nz-card>

</div>
