<div
  style="
    text-align: center;
    padding: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  "
>
  <img
    [src]="photo"
    alt="Caller photo"
    width="100"
    height="100"
    style="border-radius: 50%; margin-bottom: 16px;"
  />

  <div style="font-size: 22px; font-weight: 500;">
    {{callerName}}
  </div>





  <div *ngIf="callStatus==CallStatus.Calling" style="display: flex; gap: 10px; margin-top: 10px;">
    <button
      nz-button
      nzType="primary"
      (click)="acceptCall()"
      style="background-color: #4caf50; border-color: #4caf50;"
    >
      <i nz-icon nzType="phone" nzTheme="outline" style="margin-right: 6px;"></i>
      Cavab ver
    </button>

    <button nz-button nzType="default" nzDanger (click)="rejectCall(CallStatus.RejectByReceiver)">
      <i nz-icon nzType="close-circle" style="margin-right: 6px;"></i>
      Rədd et
    </button>
  </div>


  <button nz-button nzType="primary" *ngIf="callStatus!=CallStatus.Calling" (click)="rejectCall(CallStatus.EndByReceiver)">
    Zəngi bitir
  </button>


  <!-- Remote Video (Böyük) -->
  <div style="position: relative; width: 100%; max-width: 500px;">

    <video
      #remoteVideo
      autoplay
      playsinline
      style="
      width: 100%;
      border-radius: 10px;
      background: black;
    "
    ></video>
    <!-- 🔵 Control Buttons (Mute / Stop Video) -->
    <div
      style="
      position: absolute;
      bottom: 12px;
      left: 12px;
      display: flex;
      gap: 10px;
    "
    >
      <!-- 🔇 Səsi bağlama düyməsi -->
      <button
        nz-button
        nzShape="circle"
        nzType="default"
        (click)="toggleMute()"
        style="background: rgba(0,0,0,0.6); color: white; border: none;"
      >
        <i nz-icon [nzType]="isMuted ? 'sound' : 'audio-muted'"></i>
      </button>

      <!-- 🎥 Kameranı dayandır düyməsi -->
      <button
        nz-button
        nzShape="circle"
        nzType="default"
        (click)="toggleVideo()"
        style="background: rgba(0,0,0,0.6); color: white; border: none;"
      >
        <i nz-icon [nzType]="isVideoStopped ? 'video-camera' : 'video-camera'"></i>
      </button>
    </div>

    <div style="margin-top: 10px;" *ngIf="callStatus==CallStatus.CallAccept">
      <button nz-button nzType="primary" (click)="startRecording()"   *ngIf="!isRecording">
        ⏺️ Record
      </button>

      <button nz-button nzDanger (click)="stopRecording()"   *ngIf="isRecording">
        ⏹️ Stop
      </button>
    </div>

    <div *ngIf="isRecording && callStatus==CallStatus.CallAccept" style="margin-top:10px; font-size:18px; color:red;">
      🔴 Recording... {{ recordingSeconds }} s
    </div>

    <!-- Local Video (Kiçik — sağ alt künc) -->
    <video
      #localVideo
      autoplay
      muted
      playsinline
      style="
      position: absolute;
      bottom: 12px;
      right: 12px;
      width: 120px;
      height: 90px;
      object-fit: cover;
      border-radius: 8px;
      border: 2px solid white;
      background: black;
    "
    ></video>

  </div>

</div>
